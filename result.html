<!DOCTYPE html>
<html>

<head>
    <title>Result</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="box">

<h1>{{ level }}</h1>

<h2>Score: {{ score }}/100</h2>

<p>{{ coach_message }}</p>

<ul>
{% for f in feedback %}
    <li>{{ f }}</li>
{% endfor %}
</ul>

<a href="/">
    <button>Try Again</button>
</a>

</div>

</body>
</html>
